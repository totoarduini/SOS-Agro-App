<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registros de Campo — SOS Agro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #f1f5f9;
    --surface: #ffffff;
    --surface2:#f8fafc;
    --border:  #e2e8f0;
    --border2: #cbd5e1;
    --green:   #16a34a;
    --green-bg:#dcfce7;
    --yellow-bg:#fef9c3;
    --blue-bg: #dbeafe;
    --orange-bg:#ffedd5;
    --purple-bg:#ede9fe;
    --text:    #0f172a;
    --text2:   #475569;
    --text3:   #94a3b8;
    --shadow:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --shadow-lg: 0 10px 40px rgba(0,0,0,.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 54px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .logo-text {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 14px; color: var(--text);
  }
  .logo-text span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .status-dot.ok { background: var(--green); animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .btn-new {
    background: var(--green); color: #fff;
    border: none; border-radius: 7px; padding: 7px 16px;
    font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-new:hover { opacity: .85; }

  /* ── FILTERS ── */
  .filters-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text3); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
  }
  select, input[type="text"] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 5px 10px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.1);
  }
  .search-input { width: 200px; }
  .count-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text3); margin-left: auto; white-space: nowrap;
  }
  .count-badge strong { color: var(--green); }

  /* ── MAIN ── */
  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface2); position: sticky; top: 54px; z-index: 10; }
  th {
    padding: 10px 14px; text-align: left;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--text3); text-transform: uppercase; letter-spacing: .6px;
    white-space: nowrap; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text2); }
  th.sorted { color: var(--green); }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0fdf4; }
  tbody tr.active-row { background: #dcfce7; }
  td { padding: 10px 14px; white-space: nowrap; color: var(--text2); }
  td.primary { color: var(--text); font-weight: 600; }
  td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  .tag {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
  }
  .tag-soja    { background: var(--yellow-bg); color: #854d0e; }
  .tag-maiz    { background: var(--blue-bg);   color: #1e40af; }
  .tag-trigo   { background: #fef3c7;          color: #92400e; }
  .tag-girasol { background: var(--orange-bg); color: #9a3412; }
  .tag-cebada  { background: var(--purple-bg); color: #5b21b6; }
  .tag-other   { background: var(--surface2);  color: var(--text2); }

  .rinde-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text); font-weight: 600; }
  .rinde-empty { color: var(--text3); }

  /* ── STATES ── */
  .state-box {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3);
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box p { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .error-msg {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
    padding: 16px; color: #991b1b; font-size: 13px;
    font-family: 'IBM Plex Mono', monospace; white-space: pre-wrap;
  }

  /* ── CARDS mobile ── */
  .cards-view { display: none; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; cursor: pointer;
    transition: border-color .15s; margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--green); }
  .card.active-card { border-color: var(--green); background: #f0fdf4; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-weight: 600; font-size: 15px; color: var(--text); }
  .card-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
  .card-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
  .card-kv { display: flex; flex-direction: column; }
  .card-k { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; }
  .card-v { font-size: 13px; color: var(--text2); }

  /* ── OVERLAY & DRAWER ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,.35); z-index: 200; backdrop-filter: blur(2px);
  }
  .overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0;
    width: min(580px, 100vw); height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 201; transform: translateX(100%);
    transition: transform .25s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; flex-shrink: 0; background: var(--surface);
  }
  .drawer-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .drawer-title { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .drawer-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .btn-close {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text2); padding: 6px 12px;
    cursor: pointer; font-size: 15px; flex-shrink: 0; transition: all .15s;
  }
  .btn-close:hover { border-color: var(--border2); color: var(--text); }

  .drawer-body {
    overflow-y: auto; flex: 1; padding: 16px 20px 24px;
    display: flex; flex-direction: column; gap: 10px; background: var(--bg);
  }

  /* ── DRAWER SECTIONS ── */
  .dsec {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
  }
  .dsec-header {
    padding: 11px 16px; display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none; background: var(--surface);
    border-bottom: 1px solid var(--border); transition: background .1s;
  }
  .dsec-header:hover { background: var(--surface2); }
  .dsec-header.collapsed { border-bottom: none; }
  .dsec-icon { font-size: 15px; }
  .dsec-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .7px; color: var(--text2); flex: 1;
  }
  .dsec-count {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 7px;
  }
  .dsec-arrow { color: var(--text3); font-size: 11px; transition: transform .2s; margin-left: 4px; }
  .dsec-header.collapsed .dsec-arrow { transform: rotate(-90deg); }

  .dsec-body {
    padding: 14px 16px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 14px 24px;
  }
  .dsec-body.collapsed { display: none; }

  .dfield { display: flex; flex-direction: column; gap: 3px; }
  .dfield.full { grid-column: 1 / -1; }
  .dfield-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--text3); text-transform: uppercase; letter-spacing: .5px;
  }
  .dfield-val { font-size: 13px; color: var(--text); word-break: break-word; line-height: 1.4; }
  .dfield-val.highlight {
    font-family: 'IBM Plex Mono', monospace; color: var(--green);
    font-size: 16px; font-weight: 700;
  }
  .dfield-val.mono-val { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  /* Fert table */
  .fert-wrap { grid-column: 1 / -1; overflow-x: auto; }
  .fert-tbl { width: 100%; border-collapse: collapse; font-size: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .fert-tbl th {
    background: var(--surface2); padding: 7px 10px; font-size: 10px;
    color: var(--text3); text-align: left; border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
    position: static; top: auto; cursor: default;
  }
  .fert-tbl td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text2); white-space: nowrap; }
  .fert-tbl tr:last-child td { border-bottom: none; }
  .fert-tbl .prod-name { color: var(--text); font-weight: 500; }

  .summary-grid {
    grid-column: 1 / -1; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
    gap: 10px; margin-top: 4px; padding-top: 12px; border-top: 1px solid var(--border);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .table-card { display: none; }
    .cards-view { display: block; }
    .search-input { width: 140px; }
    .filters-bar { overflow-x: auto; flex-wrap: nowrap; padding: 10px 12px; }
    .count-badge { display: none; }
    .drawer { width: 100vw; }
    .dsec-body { grid-template-columns: 1fr; }
    .main { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌾</div>
    <div class="logo-text">SOS<span>Agro</span> · Registros de Campo</div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Cargando…</span>
    </div>
    <button class="btn-new" onclick="alert('Alta de registros — próximamente')">+ Nuevo</button>
  </div>
</header>

<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">Buscar</span>
    <input type="text" class="search-input" id="search" placeholder="Campo, Lote, Genética…" oninput="applyFilters()">
  </div>
  <div class="filter-group">
    <span class="filter-label">Empresa</span>
    <select id="fEmpresa" onchange="applyFilters()"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Campaña</span>
    <select id="fCampana" onchange="applyFilters()"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Cultivo</span>
    <select id="fCultivo" onchange="applyFilters()"><option value="">Todos</option></select>
  </div>
  <div class="count-badge" id="countBadge"></div>
</div>

<div class="main">
  <div class="state-box" id="loadingState">
    <div class="spinner"></div>
    <p>Cargando datos desde Google Sheets…</p>
  </div>
  <div class="error-msg" id="errorState" style="display:none"></div>
  <div class="table-card" id="tableCard" style="display:none">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('ID Registro')">ID</th>
            <th onclick="sortBy('EMPRESA')">Empresa</th>
            <th onclick="sortBy('Campo')">Campo</th>
            <th onclick="sortBy('Lote')">Lote</th>
            <th onclick="sortBy('Campaña')">Campaña</th>
            <th onclick="sortBy('Cultivo')">Cultivo</th>
            <th onclick="sortBy('Ambiente Regional')">Ambiente</th>
            <th onclick="sortBy('Superficie Sembrada')">Sup. (ha)</th>
            <th onclick="sortBy('Antecesor')">Antecesor</th>
            <th onclick="sortBy('Fecha de Siembra')">F. Siembra</th>
            <th onclick="sortBy('Rendimiento (kg/ha sembrada)')">Rinde kg/ha</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="cards-view" id="cardsView"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-id" id="dId"></div>
      <div class="drawer-title" id="dTitle"></div>
      <div class="drawer-sub" id="dSub"></div>
    </div>
    <button class="btn-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTHHByh3mYfSKCYUj01eUDVH8cvbzkVLpQjxAEiji7ma6wOG0mJ6W9qlIgNPm_dmzbCuT19GQKTgvll/pub?gid=267525563&single=true&output=csv';

let allData = [], filtered = [];
let sortCol = 'ID Registro', sortAsc = true, activeIdx = null;

window.onload = () => loadData();

function loadData() {
  Papa.parse(CSV_URL, {
    download: true, header: true, skipEmptyLines: true,
    complete(res) {
      if (!res.data?.length) { showError('No se encontraron datos.'); return; }
      allData = res.data;
      buildFilters(); applyFilters();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('tableCard').style.display = 'block';
      document.getElementById('cardsView').style.display = 'block';
      setStatus('ok', allData.length + ' registros');
    },
    error(err) { showError('Error al cargar:\n' + err.message); }
  });
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  const el = document.getElementById('errorState');
  el.textContent = msg; el.style.display = 'block';
  setStatus('err', 'Error');
}
function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = text;
  dot.className = 'status-dot' + (type==='ok' ? ' ok' : '');
  if (type==='err') dot.style.background = '#ef4444';
}

function buildFilters() {
  const uniq = k => [...new Set(allData.map(r=>r[k]).filter(Boolean))].sort();
  fillSelect('fEmpresa', uniq('EMPRESA'));
  fillSelect('fCampana', uniq('Campaña').reverse());
  fillSelect('fCultivo', uniq('Cultivo'));
}
function fillSelect(id, vals) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  vals.forEach(v => sel.add(new Option(v,v)));
  if (cur) sel.value = cur;
}

function applyFilters() {
  const search  = document.getElementById('search').value.toLowerCase();
  const empresa = document.getElementById('fEmpresa').value;
  const campana = document.getElementById('fCampana').value;
  const cultivo = document.getElementById('fCultivo').value;
  filtered = allData.filter(r => {
    if (empresa && r['EMPRESA'] !== empresa) return false;
    if (campana && r['Campaña'] !== campana) return false;
    if (cultivo && r['Cultivo'] !== cultivo) return false;
    if (search) {
      const hay = [r['Campo'],r['Lote'],r['Genética'],r['Ambiente Regional'],r['EMPRESA']].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  sortData(); renderTable(); renderCards();
  document.getElementById('countBadge').innerHTML =
    `<strong>${filtered.length}</strong> / ${allData.length} registros`;
}

function sortBy(col) {
  sortAsc = sortCol===col ? !sortAsc : true; sortCol = col;
  sortData(); renderTable();
}
function sortData() {
  filtered.sort((a,b) => {
    let va=a[sortCol]||'', vb=b[sortCol]||'';
    const na=parseFloat(String(va).replace(',','.')), nb=parseFloat(String(vb).replace(',','.'));
    if (!isNaN(na)&&!isNaN(nb)) return sortAsc ? na-nb : nb-na;
    return sortAsc ? va.localeCompare(vb,'es') : vb.localeCompare(va,'es');
  });
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px">Sin resultados</td></tr>`;
    return;
  }
  filtered.forEach(row => {
    const idx = allData.indexOf(row);
    const tr = document.createElement('tr');
    if (idx===activeIdx) tr.classList.add('active-row');
    tr.onclick = () => openDrawer(row, idx);
    const rinde = row['Rendimiento (kg/ha sembrada)'];
    tr.innerHTML = `
      <td class="mono">${row['ID Registro']||'—'}</td>
      <td class="primary">${row['EMPRESA']||'—'}</td>
      <td>${row['Campo']||'—'}</td>
      <td class="mono">${row['Lote']||'—'}</td>
      <td class="mono">${row['Campaña']||'—'}</td>
      <td>${cultivoTag(row['Cultivo'])}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${row['Ambiente Regional']||'—'}</td>
      <td class="mono">${fmt(row['Superficie Sembrada'])||'—'}</td>
      <td>${row['Antecesor']||'—'}</td>
      <td class="mono">${row['Fecha de Siembra']||'—'}</td>
      <td>${rinde ? `<span class="rinde-num">${fmt(rinde)}</span>` : '<span class="rinde-empty">—</span>'}</td>`;
    tbody.appendChild(tr);
  });
}

function renderCards() {
  const cv = document.getElementById('cardsView');
  cv.innerHTML = '';
  filtered.forEach(row => {
    const idx = allData.indexOf(row);
    const div = document.createElement('div');
    div.className = 'card' + (idx===activeIdx ? ' active-card' : '');
    div.onclick = () => openDrawer(row, idx);
    const rinde = row['Rendimiento (kg/ha sembrada)'];
    div.innerHTML = `
      <div class="card-top">
        <div class="card-title">${row['Campo']||'—'} · ${row['Lote']||''}</div>
        <div class="card-id">#${row['ID Registro']||'?'}</div>
      </div>
      ${cultivoTag(row['Cultivo'])}
      <div class="card-row">
        <div class="card-kv"><span class="card-k">Empresa</span><span class="card-v">${row['EMPRESA']||'—'}</span></div>
        <div class="card-kv"><span class="card-k">Campaña</span><span class="card-v">${row['Campaña']||'—'}</span></div>
        <div class="card-kv"><span class="card-k">Sup.</span><span class="card-v">${fmt(row['Superficie Sembrada'])||'—'} ha</span></div>
        <div class="card-kv"><span class="card-k">Rinde</span><span class="card-v">${rinde ? fmt(rinde)+' kg/ha' : '—'}</span></div>
      </div>`;
    cv.appendChild(div);
  });
}

// ── DRAWER ───────────────────────────────────────────────────────────
function openDrawer(row, idx) {
  activeIdx = idx;
  renderTable(); renderCards();
  document.getElementById('dId').textContent    = `Registro #${row['ID Registro']||'?'} · ${row['Campaña']||''}`;
  document.getElementById('dTitle').textContent  = `${row['Campo']||'—'} — ${row['Lote']||''}`;
  document.getElementById('dSub').textContent    = `${row['EMPRESA']||''} · ${row['Cultivo']||''}${row['Antecesor'] ? ' / Ant: '+row['Antecesor'] : ''}`;

  const body = document.getElementById('drawerBody');
  body.innerHTML = '';

  // Definición completa de secciones
  const SECTIONS = [
    { icon:'🏢', title:'Identificación', fields:[
      ['Empresa','EMPRESA'],['Cliente SOS','Cliente SOS'],['Campo','Campo'],
      ['Lote','Lote'],['Campaña','Campaña'],['Grupo CREA','Grupo CREA'],
      ['Coordinador','Coordinador'],['Responsable','Responsable Registro'],
      ['ADM','ADM'],['Tenencia','Tenencia'],['Coordenadas','Coordenadas',true],
    ]},
    { icon:'🗺️', title:'Ambiente y Suelo', fields:[
      ['Ambiente Regional','Ambiente Regional'],['RIDZO','RIDZO'],
      ['Sup. Sembrada (ha)','Superficie Sembrada'],['Arena (%)','Arena'],
      ['pH','pH'],['M.O. (%)','M.O.'],['P Bray (ppm)','P'],
      ['Año análisis P','Año análisis P'],['SO4 / Zn','SO4_Zn'],
      ['Prof. Napa (m)','Profundidad de Napa'],
    ]},
    { icon:'🌱', title:'Siembra', fields:[
      ['Cultivo','Cultivo'],['Sub-grupo','Sub Grupo de Cultivo'],
      ['Destino','Destino'],['Antecesor','Antecesor'],
      ['Rinde esperado (kg/ha)','Rinde Esperado (kg/ha)'],
      ['Orden siembra','Orden de Siembra'],['Fecha siembra','Fecha de Siembra'],
      ['Espaciamiento (cm)','Espaciamiento (cm)'],['Semillero','Semillero'],
      ['Genética','Genética'],['Calibre','Calibre'],
      ['Plantas obj. (pl/m²)','Plantas objetivo (Plantas/m2)'],
      ['Poder germinativo','Poder germinativo'],
      ['Peso 1000 sem. (g)','Peso 1000 semillas'],
      ['Coef. logro estim.','Coef de logro estimado'],
      ['Densidad calc. (kg/ha)','Densidad Siembra Calculada'],
      ['Densidad recom. (kg/ha)','Densidad siembra Recomendada'],
      ['Pob. lograda (pl/m²)','Poblacion Lograda (Plantas/m2)'],
      ['Coef. logro real','Coeficiente de logro real'],
    ]},
    { icon:'🧪', title:'Análisis de Nitrógeno', fields:[
      ['Info análisis N','INFO ANÁLISIS N',true],
      ['NO₃ 0–20 cm','NO3_ (0-20)'],['NO₃ 20–40 cm','NO3_ (20-40)'],
      ['NO₃ 40–60 cm','NO3_ (40-60)'],
      ['N suelo 0–60 cm (kg/ha)','Nitrogeno suelo (0-60 cm)'],
      ['N objetivo (kg/ha)','Nitrogeno Objetivo'],
    ]},
    { icon:'💊', title:'Fertilización', type:'fert' },
    { icon:'🦟', title:'Adversidades', fields:[
      ['Adversidad I','Adversidad I'],['Daño I','Daño I'],
      ['Adversidad II','Adversidad II'],['Daño II','Daño II'],
    ]},
    { icon:'🌾', title:'Cosecha', fields:[
      ['Nivel información','Nivel de Información'],
      ['Fecha cosecha','Fecha Cosecha'],
      ['Sup. cosechada (ha)','Superficie Cosechada'],
      ['Rinde grano seco (kg/ha cosech.)','Rendimiento Grano Seco (kg/ha cosechada)'],
      ['Rinde (kg/ha sembrada)','Rendimiento (kg/ha sembrada)',false,true],
      ['Kg totales','Kg Totales'],['Humedad cosecha (%)','Humedad de cosecha'],
      ['Peso 1000 granos (g)','Peso de 1000 granos'],
      ['Peso Hectolítrico','Peso Hectolítrico'],
      ['Proteína (%)','Proteína'],['Materia Grasa (%)','Materia Grasa'],
    ]},
    { icon:'📦', title:'Totales por Lote', fields:[
      ['N° Bolsas necesarias','NRO BOLSAS NECESARIAS Mz/Gi'],
      ['kg Semilla total','kg Semilla total'],
      ['kg Fert. P','KG FERT P NECESARIOS'],
      ['kg Fert. 2','KG FERT 2 NECESARIOS'],
      ['kg Fert. 3','KG FERT 3 NECESARIOS'],
      ['kg Fert. 4','KG FERT 4 NECESARIOS'],
      ['Balance P','Balance P'],
    ]},
    { icon:'📝', title:'Observaciones', fields:[
      ['Observaciones','Observaciones',true],
      ['Ambiente','Ambiente',true],
      ['Lote-Cult-Ant','Lote-Cult-Ant',true],
    ]},
  ];

  SECTIONS.forEach(sec => {
    // ── Fertilización ──
    if (sec.type === 'fert') {
      const prods = [
        { label:'P1 (P)', nom: row['Fertilizante P Producto 1'],  pN: row['% N Producto 1'],  pP: row['% P2O5 Producto 1'],  pS: row['% S Producto 1'],  pZn: row['% Zn Producto 1'],  dosis: row['Dosis Fert. P Producto 1'], momento: row['Momento 1'], forma: row['Forma 1'] },
        { label:'P2 (N)', nom: row['Fertilizante N Producto 2'],  pN: row['% N Producto 2'],  pP: row['% P2O5 Producto 2'],  pS: row['% S Producto 2'],  pZn: row['% Zn Producto 2'],  dosis: row['Dosis 2'],              momento: row['Momento 2'], forma: row['Forma 2'] },
        { label:'P3',     nom: row['Producto 3'],                 pN: row['% N Producto 3'],  pP: row['% P2O5 Producto 3'],  pS: row['% S Producto 3'],  pZn: row['% Zn Producto 3'],  dosis: row['Dosis 3'],              momento: row['Momento 3'], forma: row['Forma 3'] },
        { label:'P4',     nom: row['Producto 4'],                 pN: row['% N Producto 4'],  pP: row['% P2O5 Producto 4'],  pS: row['% S Producto 4'],  pZn: row['% Zn Producto 4'],  dosis: row['Dosis 4'],              momento: row['Momento 4'], forma: row['Forma 4'] },
      ].filter(p => hasVal(p.nom) || hasVal(p.dosis));

      const sumFields = [
        ['kg N Fertilizante','kg N Fertilizante'],['N alcanzado real','N alcanzado real'],
        ['kg P Fertilizante','kg P Fertilizante'],['P (Bray) Alcanzado','P (Bray) Alcanzado'],
        ['Balance P','Balance P'],
      ].filter(([,k]) => hasVal(row[k]));

      if (!prods.length && !sumFields.length) return;

      const secEl = makeSection(sec);
      const bdy = secEl.querySelector('.dsec-body');

      if (prods.length) {
        const wrap = document.createElement('div');
        wrap.className = 'fert-wrap';
        wrap.innerHTML = `<table class="fert-tbl">
          <thead><tr><th></th><th>Producto</th><th>N%</th><th>P%</th><th>S%</th><th>Zn%</th><th>Dosis</th><th>Momento</th><th>Forma</th></tr></thead>
          <tbody>${prods.map(p=>`<tr>
            <td style="color:var(--text3);font-size:10px;font-family:'IBM Plex Mono',monospace">${p.label}</td>
            <td class="prod-name">${p.nom||'—'}</td>
            <td>${p.pN||'—'}</td><td>${p.pP||'—'}</td><td>${p.pS||'—'}</td><td>${p.pZn||'—'}</td>
            <td style="font-weight:600">${p.dosis||'—'}</td>
            <td>${p.momento||'—'}</td><td>${p.forma||'—'}</td>
          </tr>`).join('')}</tbody>
        </table>`;
        bdy.appendChild(wrap);
      }

      if (sumFields.length) {
        const sg = document.createElement('div');
        sg.className = 'summary-grid';
        sumFields.forEach(([label,key]) => {
          sg.innerHTML += `<div class="dfield"><span class="dfield-label">${label}</span><span class="dfield-val mono-val">${row[key]}</span></div>`;
        });
        bdy.appendChild(sg);
      }
      setCount(secEl, prods.length + sumFields.length);
      body.appendChild(secEl);
      return;
    }

    // ── Secciones normales: solo campos con valor ──
    const visible = sec.fields.filter(([,k]) => hasVal(row[k]));
    if (!visible.length) return;

    const secEl = makeSection(sec);
    const bdy = secEl.querySelector('.dsec-body');

    visible.forEach(([label, key, full, highlight]) => {
      const f = document.createElement('div');
      f.className = 'dfield' + (full ? ' full' : '');
      const cls = highlight ? 'highlight' : '';
      f.innerHTML = `<span class="dfield-label">${label}</span><span class="dfield-val ${cls}">${row[key]}</span>`;
      bdy.appendChild(f);
    });

    setCount(secEl, visible.length);
    body.appendChild(secEl);
  });

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function makeSection(sec) {
  const el = document.createElement('div');
  el.className = 'dsec';
  el.innerHTML = `
    <div class="dsec-header">
      <span class="dsec-icon">${sec.icon}</span>
      <span class="dsec-title">${sec.title}</span>
      <span class="dsec-count"></span>
      <span class="dsec-arrow">▾</span>
    </div>
    <div class="dsec-body"></div>`;
  const hdr = el.querySelector('.dsec-header');
  const bdy = el.querySelector('.dsec-body');
  hdr.onclick = () => { hdr.classList.toggle('collapsed'); bdy.classList.toggle('collapsed'); };
  return el;
}
function setCount(el, n) {
  el.querySelector('.dsec-count').textContent = n + ' campos';
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
  activeIdx = null; renderTable(); renderCards();
}

// ── HELPERS ──────────────────────────────────────────────────────────
function hasVal(v) { return v !== undefined && v !== null && String(v).trim() !== ''; }

function cultivoTag(c) {
  if (!c) return '';
  const lc = c.toLowerCase();
  let cls = 'tag-other';
  if (lc.includes('soja'))   cls='tag-soja';
  else if (lc.includes('maiz')||lc.includes('maíz')) cls='tag-maiz';
  else if (lc.includes('trigo'))   cls='tag-trigo';
  else if (lc.includes('girasol')) cls='tag-girasol';
  else if (lc.includes('cebada'))  cls='tag-cebada';
  return `<span class="tag ${cls}">${c}</span>`;
}
function fmt(val) {
  if (!val) return '';
  const n = parseFloat(String(val).replace(',','.'));
  return isNaN(n) ? val : n.toLocaleString('es-AR');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });
</script>
</body>
</html>
